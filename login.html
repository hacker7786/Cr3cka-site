<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — CR3CKA Security</title>
<meta name="description" content="Sign in to your CR3CKA Security account to access your dashboard, saved tools, and reports." />
<meta name="robots" content="noindex, follow" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2305070d'/><text x='50' y='68' font-size='60' text-anchor='middle' fill='%2300ff88' font-family='monospace'>C</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/auth.css" />
<link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

<div class="cyber-grid" aria-hidden="true"></div>
<div class="auth-orb o1" aria-hidden="true"></div>
<div class="auth-orb o2" aria-hidden="true"></div>

<header class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="logo">
      <span class="logo-mark">C</span>
      <span class="logo-text">CR3CKA<span>_</span>SEC</span>
    </a>
    <div class="nav-actions">
      <button class="theme-toggle" data-theme-toggle aria-label="Switch to light mode"><span data-icon>☀️</span></button>
      <a href="index.html" class="btn btn-ghost">← Home</a>
    </div>
  </div>
</header>

<main class="auth-page">
  <div class="auth-card glass">
    <div class="auth-head">
      <div class="logo"><span class="logo-mark">C</span></div>
      <h1>Welcome back</h1>
      <p>Sign in to access your dashboard and saved tools.</p>
    </div>

    <form class="auth-form" id="login-form" novalidate>
      <div class="form-group">
        <label for="login-email">Email</label>
        <div class="input-wrap">
          <svg class="leading" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M22 6l-10 7L2 6"/></svg>
          <input type="email" id="login-email" name="email" placeholder="you@company.com" autocomplete="email" />
        </div>
        <span class="field-error" id="login-email-error"></span>
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <div class="input-wrap">
          <svg class="leading" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="toggle-visibility" id="toggle-login-password" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <span class="field-error" id="login-password-error"></span>
      </div>

      <div class="auth-row">
        <label class="checkbox-row"><input type="checkbox" id="remember-me" /> Remember me</label>
        <a href="#" id="forgot-password">Forgot password?</a>
      </div>

      <button type="submit" class="btn btn-primary" id="login-submit">
        <span class="btn-label">Sign In</span>
        <span class="btn-spinner"></span>
      </button>
      <div class="form-status" id="login-status"></div>
    </form>

    <div class="auth-divider">or continue with</div>
    <div class="auth-social">
      <button type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 00-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1.1-.8.1-.7.1-.7 1.2.1 1.9 1.2 1.9 1.2 1.1 1.9 2.9 1.3 3.6 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.4-1.3-5.4-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.3 11.3 0 016 0C17 4.7 18 5 18 5c.6 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.7 5.6-5.4 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0012 .3z"/></svg> GitHub</button>
      <button type="button"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21.8 12.2c0-.7-.1-1.4-.2-2H12v3.9h5.5a4.7 4.7 0 01-2 3.1v2.6h3.3c1.9-1.8 3-4.4 3-7.6z"/><path d="M12 22c2.7 0 5-.9 6.7-2.4l-3.3-2.6c-.9.6-2 1-3.4 1-2.6 0-4.8-1.8-5.6-4.1H3v2.7A10 10 0 0012 22z"/><path d="M6.4 13.9a6 6 0 010-3.8V7.4H3a10 10 0 000 9.2z"/><path d="M12 5.9c1.5 0 2.8.5 3.8 1.5l2.9-2.9C17 2.9 14.7 2 12 2A10 10 0 003 7.4l3.4 2.7c.8-2.3 3-4.2 5.6-4.2z"/></svg> Google</button>
    </div>

    <p class="auth-foot">Don't have an account? <a href="signup.html">Create one</a></p>
  </div>
</main>

<script src="js/animations.js"></script>
<script src="js/login.js"></script>
</body>
</html>
