<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign Up — CR3CKA Security</title>
<meta name="description" content="Create a free CR3CKA Security account to save favorite tools, track projects, and get research updates." />
<meta name="robots" content="noindex, follow" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2305070d'/><text x='50' y='68' font-size='60' text-anchor='middle' fill='%2300ff88' font-family='monospace'>C</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
<link rel="stylesheet" href="css/auth.css" />
<link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

<div class="cyber-grid" aria-hidden="true"></div>
<div class="auth-orb o1" aria-hidden="true"></div>
<div class="auth-orb o2" aria-hidden="true"></div>

<header class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="logo">
      <span class="logo-mark">C</span>
      <span class="logo-text">CR3CKA<span>_</span>SEC</span>
    </a>
    <div class="nav-actions">
      <button class="theme-toggle" data-theme-toggle aria-label="Switch to light mode"><span data-icon>☀️</span></button>
      <a href="index.html" class="btn btn-ghost">← Home</a>
    </div>
  </div>
</header>

<main class="auth-page">
  <div class="auth-card glass">
    <div class="auth-head">
      <div class="logo"><span class="logo-mark">C</span></div>
      <h1>Create your account</h1>
      <p>Join to save tools, track projects, and follow new research.</p>
    </div>

    <form class="auth-form" id="signup-form" novalidate>
      <div class="form-group">
        <label for="signup-name">Full name</label>
        <div class="input-wrap">
          <svg class="leading" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="signup-name" name="name" placeholder="Jane Doe" autocomplete="name" />
        </div>
        <span class="field-error" id="signup-name-error"></span>
      </div>

      <div class="form-group">
        <label for="signup-username">Username</label>
        <div class="input-wrap">
          <svg class="leading" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20l4-16h8l4 16"/><path d="M8 12h8"/></svg>
          <input type="text" id="signup-username" name="username" placeholder="janedoe" autocomplete="username" />
        </div>
        <span class="field-error" id="signup-username-error"></span>
      </div>

      <div class="form-group">
        <label for="signup-email">Email</label>
        <div class="input-wrap">
          <svg class="leading" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M22 6l-10 7L2 6"/></svg>
          <input type="email" id="signup-email" name="email" placeholder="you@company.com" autocomplete="email" />
        </div>
        <span class="field-error" id="signup-email-error"></span>
      </div>

      <div class="form-group">
        <label for="signup-password">Password</label>
        <div class="input-wrap">
          <svg class="leading" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input type="password" id="signup-password" name="password" placeholder="Create a password" autocomplete="new-password" />
          <button type="button" class="toggle-visibility" id="toggle-signup-password" aria-label="Show password">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-meter" id="strength-meter"><span class="seg"></span><span class="seg"></span><span class="seg"></span><span class="seg"></span></div>
        <span class="strength-label" id="strength-label"></span>
        <span class="field-error" id="signup-password-error"></span>
      </div>

      <div class="form-group">
        <label for="signup-confirm">Confirm password</label>
        <div class="input-wrap">
          <svg class="leading" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg>
          <input type="password" id="signup-confirm" name="confirm" placeholder="Repeat your password" autocomplete="new-password" />
        </div>
        <span class="field-error" id="signup-confirm-error"></span>
      </div>

      <div class="auth-row">
        <label class="checkbox-row"><input type="checkbox" id="signup-terms" /> I agree to the <a href="#" style="margin-left:4px;">Terms &amp; Privacy Policy</a></label>
      </div>
      <span class="field-error" id="terms-error"></span>

      <button type="submit" class="btn btn-primary" id="signup-submit" style="margin-top:14px;">
        <span class="btn-label">Create Account</span>
        <span class="btn-spinner"></span>
      </button>
      <div class="form-status" id="signup-status"></div>
    </form>

    <p class="auth-foot">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</main>

<script src="js/animations.js"></script>
<script src="js/signup.js"></script>
</body>
</html>
